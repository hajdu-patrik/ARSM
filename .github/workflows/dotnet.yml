name: .NET

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: app

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build --no-restore

    - name: Test
      run: dotnet test --no-build --verbosity normal

    - name: Check NuGet vulnerabilities
      shell: bash
      run: |
        set -o pipefail
        dotnet list package --vulnerable --include-transitive 2>&1 | tee vuln-report.txt
        ! grep -qi 'has the following vulnerable packages' vuln-report.txt

  frontend-check:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: app/AutoService.WebUI

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22
        cache: 'npm'
        cache-dependency-path: app/AutoService.WebUI/package-lock.json

    - name: Install dependencies
      run: npm ci

    - name: Type-check
      run: npx tsc --noEmit

    - name: Audit npm dependencies
      run: npm audit --audit-level=high

  playwright-e2e:
    runs-on: ubuntu-latest
    needs: [build, frontend-check]
    env:
      ARSM_TEST_MECHANIC_EMAIL: ${{ secrets.ARSM_TEST_MECHANIC_EMAIL }}
      ARSM_TEST_MECHANIC_PASSWORD: ${{ secrets.ARSM_TEST_MECHANIC_PASSWORD }}
      ARSM_TEST_WRONG_PASSWORD: ${{ secrets.ARSM_TEST_WRONG_PASSWORD }}
      ARSM_TEST_CUSTOMER_EMAIL: ${{ secrets.ARSM_TEST_CUSTOMER_EMAIL }}
      PORT: "5173"
      VITE_API_URL: https://localhost:5200
      PLAYWRIGHT_REUSE_EXISTING_SERVER: "1"

    defaults:
      run:
        working-directory: app/AutoService.WebUI

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22
        cache: 'npm'
        cache-dependency-path: app/AutoService.WebUI/package-lock.json

    - name: Install dependencies
      run: npm ci

    - name: Install Playwright browsers
      run: npx playwright install --with-deps chromium

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Start application stack
      run: |
        dotnet run --project ../AutoService.AppHost > apphost_logs.txt 2>&1 &

        echo "Waiting for services to become healthy..."
        SECONDS=0
        TIMEOUT=180
        while ! curl -kfsS https://localhost:5173 > /dev/null 2>&1 || ! curl -kfsS https://localhost:5200/alive > /dev/null 2>&1; do
          if [ "$SECONDS" -ge "$TIMEOUT" ]; then
            echo "ERROR: Services did not become healthy within ${TIMEOUT}s"
            echo "--- DUMPING APPHOST LOGS ---"
            cat apphost_logs.txt
            exit 1
          fi
          sleep 2
        done
        echo "Application stack is ready!"

    - name: Run Playwright tests
      run: npx playwright test

    - name: Upload Playwright report
      if: ${{ !cancelled() }}
      uses: actions/upload-artifact@v4
      with:
        name: playwright-report
        path: app/AutoService.WebUI/playwright-report/
        retention-days: 14